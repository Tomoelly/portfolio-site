<style>

  .md a{color:var(--accent2)}

  .md code{background:#0b0f14;border:1px solid var(--line);border-radius:6px;padding:2px 7px;font-size:13.5px;font-family:"SF Mono",Menlo,Consolas,monospace;color:#f3d68a}

  .md table{width:100%;border-collapse:collapse;margin:20px 0;font-size:14.5px;display:block;overflow-x:auto}
  .md th,.md td{border:1px solid var(--line);padding:10px 14px;text-align:left;vertical-align:top}
  .md th{background:var(--panel);color:var(--txt);font-weight:600}
  .md td{color:#d4dce4}
  .md img{max-width:100%;height:auto;border-radius:12px;border:1px solid var(--line);margin:18px 0;display:block}
  .md hr{border:none;border-top:1px solid var(--line);margin:32px 0}
  .footer{max-width:820px;margin:0 auto;padding:0 24px 60px}
  .footer .box{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px;text-align:center}
  .footer .box a.btn{display:inline-block;margin-top:6px;background:var(--accent);color:#08120b;font-weight:600;padding:11px 20px;border-radius:11px}
